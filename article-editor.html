<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Editor - Step 5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 20px;
            padding: 24px 30px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header h1 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .header p {
            font-size: 15px;
            color: #64748b;
        }
        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .breadcrumb-step {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: #f1f5f9;
            color: #64748b;
        }
        .breadcrumb-step.active {
            background: #3b82f6;
            color: white;
        }
        .breadcrumb-step.done {
            background: #dbeafe;
            color: #2563eb;
        }
        .breadcrumb-arrow {
            color: white;
            font-size: 16px;
            opacity: 0.8;
        }
        /* Back button */
        .button-back {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .button-back:hover {
            background: rgba(255,255,255,0.35);
        }
        /* Editor card */
        .editor-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }
        /* Toolbar */
        .toolbar {
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .toolbar-group {
            display: flex;
            gap: 2px;
            padding-right: 10px;
            margin-right: 6px;
            border-right: 2px solid #e2e8f0;
        }
        .toolbar-group:last-child {
            border-right: none;
        }
        .tb-btn {
            padding: 6px 10px;
            border: 1px solid transparent;
            border-radius: 5px;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            transition: all 0.15s;
            min-width: 32px;
            text-align: center;
        }
        .tb-btn:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }
        .tb-btn.active {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #2563eb;
        }
        .tb-select {
            padding: 5px 8px;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            background: white;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
        }
        .tb-divider {
            width: 1px;
            height: 24px;
            background: #e2e8f0;
            margin: 0 4px;
        }
        /* Word count bar */
        .word-count-bar {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 6px 20px;
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #64748b;
        }
        .word-count-bar span strong {
            color: #1e293b;
        }
        /* Editable content area */
        .editor-content {
            min-height: 500px;
            max-height: calc(100vh - 360px);
            overflow-y: auto;
            padding: 30px 40px;
            outline: none;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 16px;
            line-height: 1.8;
            color: #1e293b;
        }
        .editor-content:focus {
            box-shadow: inset 0 0 0 2px #3b82f6;
        }
        /* Strip AI markers when editing */
        .editor-content [data-ai-rewrite],
        .editor-content .rewritten-content {
            background: transparent;
            border: none;
            padding: 0;
            display: inline;
        }
        .editor-content [data-ai-rewrite]::before,
        .editor-content .rewritten-content::before {
            display: none;
        }
        /* Placeholder */
        .editor-content:empty::before {
            content: 'Start typing or load content from Step 2 (Brand Neutralizer)...';
            color: #94a3b8;
            pointer-events: none;
        }
        /* Heading styles inside editor */
        .editor-content h1, .editor-content h2, .editor-content h3,
        .editor-content h4, .editor-content h5, .editor-content h6 {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 20px 0 10px;
            color: #1e293b;
        }
        .editor-content h1 { font-size: 28px; }
        .editor-content h2 { font-size: 24px; }
        .editor-content h3 { font-size: 20px; }
        .editor-content p { margin-bottom: 14px; }
        .editor-content ul, .editor-content ol { padding-left: 28px; margin-bottom: 14px; }
        .editor-content li { margin-bottom: 6px; }
        .editor-content blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 16px;
            margin: 16px 0;
            color: #64748b;
            font-style: italic;
        }
        /* Action bar */
        .action-bar {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .action-bar-left {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .button:hover { transform: translateY(-1px); }
        .button.primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }
        .button.secondary {
            background: #e2e8f0;
            color: #475569;
        }
        .button.green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        .button.orange {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }
        /* Success/error toasts */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            transform: translateY(0);
            transition: opacity 0.3s, transform 0.3s;
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.hidden {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }
        @media (max-width: 768px) {
            .editor-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="button-back" onclick="window.location.href='article-diff.html'">&#8592; Back to Diff Tool</button>

    <div class="container">
        <div class="header">
            <h1>Word Editor</h1>
            <p>Review and refine your brand-neutralized article before final export</p>
            <div class="breadcrumb">
                <span class="breadcrumb-step done">Step 1: Article Extractor</span>
                <span class="breadcrumb-arrow">&#8594;</span>
                <span class="breadcrumb-step done">Step 2: Brand Neutralizer</span>
                <span class="breadcrumb-arrow">&#8594;</span>
                <span class="breadcrumb-step done">Step 3: Diff Tool</span>
                <span class="breadcrumb-arrow">&#8594;</span>
                <span class="breadcrumb-step active">Step 5: Word Editor</span>
            </div>
        </div>

        <div class="editor-card">
            <div class="toolbar">
                <!-- Text style -->
                <div class="toolbar-group">
                    <select class="tb-select" id="headingSelect" onchange="applyHeading(this.value)" title="Heading">
                        <option value="div">Paragraph</option>
                        <option value="h1">Heading 1</option>
                        <option value="h2">Heading 2</option>
                        <option value="h3">Heading 3</option>
                        <option value="h4">Heading 4</option>
                    </select>
                </div>
                <!-- Formatting -->
                <div class="toolbar-group">
                    <button class="tb-btn" onclick="execCmd('bold')" title="Bold (Ctrl+B)"><strong>B</strong></button>
                    <button class="tb-btn" onclick="execCmd('italic')" title="Italic (Ctrl+I)"><em>I</em></button>
                    <button class="tb-btn" onclick="execCmd('underline')" title="Underline (Ctrl+U)" style="text-decoration:underline;">U</button>
                    <button class="tb-btn" onclick="execCmd('strikeThrough')" title="Strikethrough" style="text-decoration:line-through;">S</button>
                </div>
                <!-- Alignment -->
                <div class="toolbar-group">
                    <button class="tb-btn" onclick="execCmd('justifyLeft')" title="Align Left">&#8676;</button>
                    <button class="tb-btn" onclick="execCmd('justifyCenter')" title="Center">&#8677;</button>
                    <button class="tb-btn" onclick="execCmd('justifyRight')" title="Align Right">&#8678;</button>
                </div>
                <!-- Lists -->
                <div class="toolbar-group">
                    <button class="tb-btn" onclick="execCmd('insertUnorderedList')" title="Bullet List">&#8226; List</button>
                    <button class="tb-btn" onclick="execCmd('insertOrderedList')" title="Numbered List">1. List</button>
                </div>
                <!-- Indent -->
                <div class="toolbar-group">
                    <button class="tb-btn" onclick="execCmd('indent')" title="Indent">&#8677;</button>
                    <button class="tb-btn" onclick="execCmd('outdent')" title="Outdent">&#8676;</button>
                </div>
                <!-- Undo/Redo -->
                <div class="toolbar-group">
                    <button class="tb-btn" onclick="execCmd('undo')" title="Undo (Ctrl+Z)">&#8630;</button>
                    <button class="tb-btn" onclick="execCmd('redo')" title="Redo (Ctrl+Y)">&#8631;</button>
                </div>
                <!-- Clear markers -->
                <div class="toolbar-group">
                    <button class="tb-btn" onclick="clearAIMarkers()" title="Remove AI highlighting markers" style="font-size:12px;">Clear Markers</button>
                </div>
            </div>

            <div class="word-count-bar">
                <span>Words: <strong id="wordCount">0</strong></span>
                <span>Characters: <strong id="charCount">0</strong></span>
                <span>Paragraphs: <strong id="paraCount">0</strong></span>
            </div>

            <div
                class="editor-content"
                id="editorContent"
                contenteditable="true"
                spellcheck="true"
            ></div>
        </div>

        <div class="action-bar">
            <div class="action-bar-left">
                <button class="button primary" onclick="copyToClipboard()">Copy to Clipboard</button>
                <button class="button orange" onclick="downloadHtml()">Download HTML</button>
                <button class="button secondary" onclick="downloadText()">Download Text</button>
            </div>
            <div>
                <button class="button green" onclick="clearAIMarkers()">Finalize (Remove Markers)</button>
            </div>
        </div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <script>
        const editor = document.getElementById('editorContent');

        // Load content from sessionStorage
        window.addEventListener('DOMContentLoaded', () => {
            const content = sessionStorage.getItem('editor_content') || '';
            if (content) {
                const cleaned = cleanForEditor(content);
                editor.innerHTML = cleaned;
            }
            updateWordCount();
        });

        function cleanForEditor(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // Remove script tags
            doc.querySelectorAll('script').forEach(el => el.remove());

            // Make images responsive
            doc.querySelectorAll('img').forEach(el => {
                el.style.maxWidth = '100%';
                el.setAttribute('loading', 'lazy');
            });

            return doc.body ? doc.body.innerHTML : html;
        }

        function clearAIMarkers() {
            // Unwrap all data-ai-rewrite and rewritten-content spans, keeping their text content
            const spans = editor.querySelectorAll('[data-ai-rewrite], .rewritten-content');
            spans.forEach(span => {
                const parent = span.parentNode;
                while (span.firstChild) {
                    parent.insertBefore(span.firstChild, span);
                }
                parent.removeChild(span);
            });
            showToast('AI markers removed', 'success');
            updateWordCount();
        }

        function execCmd(command, value = null) {
            editor.focus();
            document.execCommand(command, false, value);
            updateWordCount();
        }

        function applyHeading(tag) {
            editor.focus();
            document.execCommand('formatBlock', false, tag);
        }

        function updateWordCount() {
            const text = editor.innerText || '';
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            const chars = text.length;
            const paras = editor.querySelectorAll('p, h1, h2, h3, h4, h5, h6').length || 1;

            document.getElementById('wordCount').textContent = words.toLocaleString();
            document.getElementById('charCount').textContent = chars.toLocaleString();
            document.getElementById('paraCount').textContent = paras.toLocaleString();
        }

        editor.addEventListener('input', updateWordCount);
        editor.addEventListener('keyup', updateWordCount);

        // Keyboard shortcut support (browser execCommand handles Ctrl+B/I/U natively,
        // this handles any extras)
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;');
            }
        });

        function copyToClipboard() {
            const html = editor.innerHTML;
            if (navigator.clipboard && window.ClipboardItem) {
                const blob = new Blob([html], { type: 'text/html' });
                const item = new ClipboardItem({ 'text/html': blob });
                navigator.clipboard.write([item])
                    .then(() => showToast('Copied rich text to clipboard!', 'success'))
                    .catch(() => fallbackCopy());
            } else {
                fallbackCopy();
            }
        }

        function fallbackCopy() {
            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(editor);
            selection.removeAllRanges();
            selection.addRange(range);
            document.execCommand('copy');
            selection.removeAllRanges();
            showToast('Content copied to clipboard', 'success');
        }

        function downloadHtml() {
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const filename = `edited-article-${timestamp}.html`;
            const htmlDoc = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edited Article</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            font-size: 16px;
            line-height: 1.8;
            color: #1e293b;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 24px 0 12px;
            color: #1e293b;
        }
        p { margin-bottom: 14px; }
        ul, ol { padding-left: 28px; margin-bottom: 14px; }
        li { margin-bottom: 6px; }
        blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 16px;
            margin: 16px 0;
            color: #64748b;
            font-style: italic;
        }
        img { max-width: 100%; }
    </style>
</head>
<body>
${editor.innerHTML}
</body>
</html>`;
            downloadFile(htmlDoc, filename, 'text/html');
            showToast(`Downloaded ${filename}`, 'success');
        }

        function downloadText() {
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const filename = `edited-article-${timestamp}.txt`;
            const text = editor.innerText || '';
            downloadFile(text, filename, 'text/plain');
            showToast(`Downloaded ${filename}`, 'success');
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
